name: Ubuntu Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential software-properties-common ninja-build lcov

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.2.0'
        host: 'linux'
        target: 'desktop'
        install-deps: 'true'

    - name: Configure Qt env
      run: echo '${{ env.QT_ROOT_DIR }}/bin' >> ${GITHUB_PATH}

    - name: Configure CMake
      env:
        CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
      run: |
        cmake -B ${{ github.workspace }}/build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DENABLE_COVERAGE=ON \
          -G Ninja

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      env:
        QT_QPA_PLATFORM: offscreen
      run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

    - name: Generate coverage report
      working-directory: ${{ github.workspace }}/build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '*/Qt/*' '*/tests/*' '/usr/*' \
          --output-file coverage.info --ignore-errors unused
        genhtml coverage.info --output-directory coverage_html

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ${{ github.workspace }}/build/coverage_html

