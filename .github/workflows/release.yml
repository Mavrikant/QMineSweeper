name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Install gcc-11
        run: |
          sudo apt install build-essential manpages-dev software-properties-common
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install gcc-11 g++-11

      - name: Install Qt
        uses: jurplel/install-qt-action@v2
        with:
          version: '6.2.0'
          host: 'linux'
          target: 'desktop'
          install-deps: 'true'

      - name: Configure CMake
        env:
          CMAKE_PREFIX_PATH: ${{ env.Qt6_DIR }}
        run: CXX=g++-11 CC=gcc-11 cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: CXX=g++-11 CC=gcc-11 cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Package
        run: |
          mkdir QMineSweeper-linux
          cp build/QMineSweeper QMineSweeper-linux/
          tar -czf QMineSweeper-linux.tar.gz QMineSweeper-linux/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v3
        with:
          name: QMineSweeper-linux
          path: QMineSweeper-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v2
        with:
          version: '6.2.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: '${{ github.workspace }}/qt/'
          install-deps: 'true'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        env:
          CMAKE_PREFIX_PATH: ${{ env.Qt6_DIR }}
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G "NMake Makefiles"

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path QMineSweeper-windows
          Copy-Item build\QMineSweeper.exe QMineSweeper-windows\
          & "${{ env.Qt6_DIR }}\bin\windeployqt.exe" QMineSweeper-windows\QMineSweeper.exe
          Compress-Archive -Path QMineSweeper-windows -DestinationPath QMineSweeper-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: QMineSweeper-windows
          path: QMineSweeper-windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v3
        with:
          name: QMineSweeper-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: QMineSweeper-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            QMineSweeper-linux.tar.gz
            QMineSweeper-windows.zip
